spring.application.name=financial-system
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/financial_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposesOnly123456789
app.jwt.expiration=30000

spring.data.mongodb.uri=mongodb://localhost:27017/financial_system


